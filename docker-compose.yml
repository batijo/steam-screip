services:
  scraper:
    build: .
    environment:
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
      - DISCORD_WEBHOOK_URLS=${DISCORD_WEBHOOK_URLS}
      - DATABASE_PATH=${DATABASE_PATH}
      - SCRAPE_INTERVAL_SECONDS=${SCRAPE_INTERVAL_SECONDS}
      - LOG_LEVEL=${LOG_LEVEL}
      - DISCORD_USERNAME=${DISCORD_USERNAME}
      - DISCORD_AVATAR_URL=${DISCORD_AVATAR_URL}
      - DISCORD_MESSAGE_TEMPLATE=${DISCORD_MESSAGE_TEMPLATE}
      - STEAMDB_SALES_URL=${STEAMDB_SALES_URL}
      - SCRAPE_USER_AGENT=${SCRAPE_USER_AGENT}
      - SCRAPE_ACCEPT=${SCRAPE_ACCEPT}
      - SCRAPE_ACCEPT_LANGUAGE=${SCRAPE_ACCEPT_LANGUAGE}
      - SCRAPE_ACCEPT_ENCODING=${SCRAPE_ACCEPT_ENCODING}
      - SCRAPE_IMPERSONATE=${SCRAPE_IMPERSONATE}
      - SCRAPE_TIMEOUT_SECONDS=${SCRAPE_TIMEOUT_SECONDS}
      - PARSER_TABLE_ROWS_XPATH=${PARSER_TABLE_ROWS_XPATH}
      - PARSER_DISCOUNT_XPATH=${PARSER_DISCOUNT_XPATH}
      - PARSER_NAME_XPATH=${PARSER_NAME_XPATH}
      - PARSER_STORE_XPATH=${PARSER_STORE_XPATH}
      - RETENTION_DAYS=${RETENTION_DAYS}
    volumes:
      - scraper_data:/app/data
    restart: unless-stopped

volumes:
  scraper_data:
